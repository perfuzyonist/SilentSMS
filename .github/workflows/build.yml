name: iOS Build
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Xcode Direct
        run: |
          # Proje dosyası olmadan basit bir xcode yapısı kuruyoruz
          mkdir -p SilentSMS.app
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -o SilentSMS.app/SilentSMS SilentSMSApp.swift ContentView.swift SharedLogic.swift -framework SwiftUI -framework IdentityLookup
          cp Info.plist SilentSMS.app/Info.plist
          mkdir Payload
          cp -r SilentSMS.app Payload/
          zip -r SilentSMS.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: SilentSMS-IPA
          path: SilentSMS.ipa
