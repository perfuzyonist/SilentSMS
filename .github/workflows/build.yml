name: iOS Build
on: [push]
jobs:
  deploy:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Project
        run: xcodegen generate --spec project.yml
      - name: Build App
        run: |
          xcodebuild build -project SilentSMS.xcodeproj -scheme SilentSMS -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO ENTITLEMENTS_REQUIRED=NO \
          CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/build
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r $GITHUB_WORKSPACE/build/SilentSMS.app Payload/
          zip -r SilentSMS.ipa Payload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilentSMS-IPA
          path: SilentSMS.ipa
